name: RettApp
options:
  bundleIdPrefix: fr.afsr
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  RettApp:
    type: application
    platform: iOS
    sources:
      - path: RettApp
        excludes:
          - "Resources/Info.plist"
          - "Resources/RettApp.entitlements"
    resources:
      - RettApp/Resources/Assets.xcassets
      - RettApp/Resources/Localizable.strings
    info:
      path: RettApp/Resources/Info.plist
    entitlements:
      path: RettApp/Resources/RettApp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.afsr.RettApp
        PRODUCT_NAME: RettApp
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_ENTITLEMENTS: RettApp/Resources/RettApp.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies: []
  RettAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RettAppTests
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/RettApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RettApp
    dependencies:
      - target: RettApp
schemes:
  RettApp:
    build:
      targets:
        RettApp: all
        RettAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RettAppTests
    archive:
      config: Release
