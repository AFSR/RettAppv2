name: AFSR
options:
  bundleIdPrefix: fr.afsr
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  AFSR:
    type: application
    platform: iOS
    sources:
      - path: AFSR
        excludes:
          - "Resources/Info.plist"
          - "Resources/AFSR.entitlements"
    resources:
      - AFSR/Resources/Assets.xcassets
      - AFSR/Resources/Localizable.strings
    info:
      path: AFSR/Resources/Info.plist
    entitlements:
      path: AFSR/Resources/AFSR.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.afsr.RettApp
        PRODUCT_NAME: RettApp
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_ENTITLEMENTS: AFSR/Resources/AFSR.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies: []
  AFSRTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AFSRTests
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/RettApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RettApp
    dependencies:
      - target: AFSR
schemes:
  AFSR:
    build:
      targets:
        AFSR: all
        AFSRTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AFSRTests
    archive:
      config: Release
